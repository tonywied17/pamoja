name: node

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build and smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build native addon
        run: npm run build

      - name: Smoke test
        run: npm test
